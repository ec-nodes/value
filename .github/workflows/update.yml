name: Free Value Bet Bot

on:
  schedule:
    - cron: '*/30 * * * *' # Rulează la fiecare 30 de minute
  workflow_dispatch: # Permite rularea manuală din tab-ul Actions

permissions:
  contents: write # NECESAR pentru a putea face commit și push

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Scraper
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py
        
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add date_meciuri.json
          git commit -m "Update meciuri" || exit 0
          git push
